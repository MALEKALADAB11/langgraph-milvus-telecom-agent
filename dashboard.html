<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .dashboard { display: flex; justify-content: space-around; }
        .widget { border: 1px solid #ccc; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Interactive Dashboard</h1>
    <div class="dashboard">
        <div class="widget">
            <h2>Widget 1</h2>
            <p>Content for widget 1 goes here.</p>
        </div>
        <div class="widget">
            <h2>Widget 2</h2>
            <p>Content for widget 2 goes here.</p>
        </div>
        <div class="widget">
            <h2>Widget 3</h2>
            <p>Content for widget 3 goes here.</p>
        </div>
    </div>
</body>
</html>
